<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI | AI Engine</title>
    <style>
        :root { --neon: #00f2ff; --bg: #08080c; --card: #12121a; --text: #e0e0e0; }
        * { box-sizing: border-box; transition: 0.3s; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; 
        }
        
        /* Glassmorphism Header */
        nav { 
            background: rgba(18, 18, 26, 0.8); backdrop-filter: blur(10px);
            padding: 15px 20px; border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* Pro IDE Layout */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        
        #editor { 
            flex: 1; background: var(--card); color: #80ffea; 
            border: 1px solid #2d2d3d; border-radius: 12px; padding: 20px;
            font-family: 'Fira Code', monospace; font-size: 14px; outline: none;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5); resize: none;
        }
        #editor:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }

        /* Action Bar */
        .controls { display: flex; gap: 10px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: bold; text-transform: uppercase; font-size: 12px;
        }
        .btn-ai { background: linear-gradient(45deg, #00f2ff, #0066ff); color: white; }
        .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4); }

        /* Status Bar */
        footer { 
            background: #000; padding: 8px 20px; font-size: 11px; 
            color: #666; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">OMNI-V1</div>
    <div style="font-size: 12px; opacity: 0.6;">3008MB EDGE ACTIVE</div>
</nav>

<div class="main-container">
    <textarea id="editor" spellcheck="false">/* Type your logic here... */</textarea>
    
    <div class="controls">
        <button class="btn btn-ai" onclick="askAI()">✨ ACTIVATE OMNI AI</button>
    </div>
</div>

<footer>
    <span id="status">SYSTEM READY</span>
    <span>v2.0.4-PREVIEW</span>
</footer>

<script>
    async function askAI() {
        const editor = document.getElementById('editor');
        const status = document.getElementById('status');
        status.innerText = "PROCESSING VIA OPENROUTER...";
        status.style.color = "var(--neon)";

        try {
            const res = await fetch('/api/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: editor.value })
            });
            const data = await res.json();
            if(data.output) {
                editor.value = data.output;
                status.innerText = "AI OPTIMIZATION COMPLETE";
            }
        } catch (e) {
            status.innerText = "CONNECTION ERROR";
            status.style.color = "#ff4444";
        }
    }
</script>
</body>
</html>
