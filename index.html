<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10G AI Platform</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        nav { background: #000; padding: 10px; display: flex; gap: 10px; border-bottom: 2px solid var(--neon); }
        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab { display: none; flex: 1; padding: 15px; flex-direction: column; }
        .active { display: flex; }
        textarea { flex: 1; background: #000; color: var(--neon); border: 1px solid #333; padding: 15px; font-family: monospace; border-radius: 10px; outline: none; }
        iframe { flex: 1; background: white; border-radius: 10px; border: none; margin-top: 10px; }
        .ai-btn { background: #8e44ad; color: white; border: none; padding: 10px; margin-top: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button class="btn" onclick="setTab('ide')">IDE</button>
    <button class="btn" onclick="setTab('stats')">STATS</button>
</nav>

<div id="ide" class="tab active">
    <textarea id="editor" oninput="run()" placeholder="Enter Code..."></textarea>
    <button class="ai-btn" onclick="askAI()">✨ AI POWER UP (GEMINI)</button>
    <iframe id="preview"></iframe>
</div>

<div id="stats" class="tab">
    <div style="background:#161b22; padding:20px; border-radius:15px; border-left: 5px solid var(--neon);">
        <h2>POWER: 10 Googolplexian</h2>
        <p id="status">Status: System Healthy</p>
    </div>
</div>

<script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    function run() {
        localStorage.setItem('saved_code', editor.value);
        const doc = preview.contentWindow.document;
        doc.open(); doc.write(editor.value); doc.close();
    }

    window.onload = () => {
        editor.value = localStorage.getItem('saved_code') || "<h1>Ready for AI Power</h1>";
        run();
    };

    async function askAI() {
        const status = document.getElementById('status');
        status.innerText = "Gemini AI is processing...";
        try {
            const res = await fetch('/api/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: "Optimize this code: " + editor.value })
            });
            const data = await res.json();
            if(data.aiResponse) {
                editor.value = data.aiResponse;
                run();
                status.innerText = "Status: AI Optimization Complete";
            }
        } catch (e) { status.innerText = "Error: Check Vercel Key"; }
    }

    function setTab(t) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(t).classList.add('active');
    }
</script>
</body>
</html>
